name: flutter_app
description: A comprehensive habit tracker and productivity app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: 1.0.8
  hive: 2.2.3
  hive_flutter: 1.1.0
  intl: 0.19.0
  path: 1.9.1
  path_provider: 2.1.5
  permission_handler: 11.4.0
  provider: 6.1.5+1
  share_plus: 7.2.2
  uuid: 4.6.0
  # Cloud sync + friend visibility (optional layer)
  firebase_core: 3.6.0
  firebase_auth: 5.3.1
  cloud_firestore: 5.4.3
  google_sign_in: 6.2.1
  connectivity_plus: 6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 2.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
